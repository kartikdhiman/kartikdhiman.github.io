<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kartik Dhiman</title>
  <style>
    :root {
      --bg: #eceff3;
      --card: #ffffff;
      --text: #20262f;
      --muted: #5b6675;
      --border: #d7dee8;
    }

    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at top, #f8fafc 0%, var(--bg) 60%);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      color: var(--text);
    }

    .links-card {
      width: min(92vw, 680px);
      padding: 2rem;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--card);
      box-shadow: 0 12px 42px rgba(31, 42, 55, 0.12);

      .links-title {
        margin: 0 0 1rem;
        font-size: clamp(1.3rem, 2vw, 1.7rem);
      }

      .links-list {
        list-style: none;
        margin: 0;
        padding: 0;
        display: grid;
        gap: 0.85rem;

        a {
          display: flex;
          align-items: center;
          gap: 0.75rem;
          padding: 0.95rem 1rem;
          border: 1px solid var(--border);
          border-radius: 12px;
          color: var(--text);
          text-decoration: none;
          font-size: clamp(1.05rem, 2vw, 1.2rem);
          font-weight: 600;
          transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;

          &:hover {
            transform: translateY(-2px);
            border-color: #b8c4d4;
            box-shadow: 0 8px 20px rgba(32, 38, 47, 0.12);
          }
        }

        .hint {
          color: var(--muted);
          font-size: 0.92rem;
          font-weight: 500;
          margin-left: auto;
        }
      }
    }

    @media (max-width: 768px) {
      .links-card {
        padding: 1.25rem;
        border-radius: 14px;

        .links-list {
          a {
            padding: 0.85rem;
          }
        }
      }
    }
  </style>
</head>

<body>
  <main class="links-card">
    <h1 class="links-title">Kartik Dhiman</h1>
    <nav aria-label="Quick links">
      <ul class="links-list">
        <li>
          <a href="http://kartikdhiman.github.io/resume">
            <span aria-hidden="true">💾</span>
            <span>Resume</span>
            <span class="hint">/resume</span>
          </a>
        </li>
        <li>
          <a href="http://kartikdhiman.com">
            <span aria-hidden="true">🔗</span>
            <span>kartikdhiman.com</span>
            <span class="hint">external</span>
          </a>
        </li>
      </ul>
    </nav>
  </main>
</body>

</html>
